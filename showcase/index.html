// 7. Fruit Search
function FruitSearchApp() {
  const [q, setQ] = useState('');
  const [res, setRes] = useState([]);
  const [loading, setLoading] = useState(false);
  useEffect(() => {
    if (!q.trim()) { setRes([]); return; }
    setLoading(true);
    const t = setTimeout(async () => {
      try {
        const r = await fetch(`https://fruit-search.freecodecamp.rocks/api/fruits?q=${q}`);
        const d = await r.json();
        setRes(d.map(f => f.name));
      } catch { setRes([]); }
      setLoading(false);
    }, 700);
    return () => { clearTimeout(t); setLoading(false); };
  }, [q]);
  return (
    <div className="fs-box">
      <label htmlFor="fs-q">Search for fruits:</label>
      <input id="fs-q" className="fs-input" type="search" placeholder="Type a fruit name…" value={q} onChange={e => setQ(e.target.value)} />
      <div className="fs-results">
        {loading ? <p className="fs-dim">Searching…</p> :
         res.length > 0 ? res.map(r => <p key={r} className="fs-item">{r}</p>) :
         q.trim() ? <p className="fs-dim">No results</p> : <p className="fs-dim">Start typing to search</p>}
      </div>
    </div>
  );
}

// 8. OTP Generator
function OTPApp() {
  const [otp, setOtp] = useState("");
  const [t, setT] = useState(0);
  useEffect(() => {
    if (t === 0) return;
    const id = setInterval(() => setT(p => p - 1), 1000);
    return () => clearInterval(id);
  }, [t]);
  return (
    <div className="otp-box">
      <h2 className="otp-title">OTP Generator</h2>
      <div className="otp-display">{otp || "------"}</div>
      <p className="otp-timer">{otp ? (t > 0 ? `Expires in ${t}s` : "Expired — generate a new one") : "Click below to generate"}</p>
      <button className="otp-btn" disabled={t > 0} onClick={() => { setOtp(Math.floor(100000 + Math.random() * 900000)); setT(5); }}>Generate OTP</button>
    </div>
  );
}

// 9. Superhero Form
function SuperheroApp() {
  const sources = ["Bitten by a strange creature","Radioactive exposure","Science experiment","Alien heritage","Ancient artifact","Other"];
  const allPowers = ["Super Strength","Super Speed","Flight","Invisibility","Telekinesis","Other"];
  const [hero, setHero] = useState(""); const [real, setReal] = useState("");
  const [src, setSrc] = useState(""); const [pows, setPows] = useState([]);
  const toggle = (e) => { const {value, checked} = e.target; setPows(checked ? [...pows, value] : pows.filter(p=>p!==value)); };
  return (
    <div className="sh-box">
      <h2>Superhero Application</h2>
      <p className="sh-sub">Complete all fields to join</p>
      <form onSubmit={e => e.preventDefault()}>
        <div className="sh-row">
          <label className="sh-field">Hero Name<input type="text" value={hero} onChange={e=>setHero(e.target.value)} placeholder="Spider-Man" /></label>
          <label className="sh-field">Real Name<input type="password" value={real} onChange={e=>setReal(e.target.value)} placeholder="••••••" /></label>
        </div>
        <label className="sh-field">Power Source
          <select value={src} onChange={e=>setSrc(e.target.value)}>
            <option value="">Select one</option>
            {sources.map(s=><option key={s} value={s}>{s}</option>)}
          </select>
        </label>
        <fieldset className="sh-powers">
          <legend>Powers (select all that apply)</legend>
          {allPowers.map(pw=>(
            <label key={pw} className="sh-pw-label"><input type="checkbox" value={pw} checked={pows.includes(pw)} onChange={toggle}/>{pw}</label>
          ))}
        </fieldset>
        <button className="sh-submit" disabled={!hero||!real||!src||!pows.length}>Join the League</button>
      </form>
    </div>
  );
}

// 10. Event RSVP
function EventRSVPApp() {
  const [name, setName] = useState(""); const [mail, setMail] = useState("");
  const [attend, setAttend] = useState(1); const [diet, setDiet] = useState("");
  const [guests, setGuests] = useState(false); const [done, setDone] = useState(false);
  return (
    <div className="ev-box">
      <div className="ev-head">
        <span className="ev-eye">Event Registration</span>
        <h2>RSVP Form</h2>
        <p>Fill in your details to confirm attendance.</p>
      </div>
      <form className="ev-form" onSubmit={e=>{e.preventDefault(); setDone(true);}}>
        <label className="ev-field">Name<input required type="text" placeholder="Jane Doe" value={name} onChange={e=>setName(e.target.value)}/></label>
        <label className="ev-field">Email<input required type="email" placeholder="jane@example.com" value={mail} onChange={e=>setMail(e.target.value)}/></label>
        <label className="ev-field">Attendees<input required type="number" min="1" value={attend} onChange={e=>setAttend(e.target.value)}/></label>
        <label className="ev-field">Dietary <span className="ev-opt">— optional</span><input type="text" placeholder="e.g. Vegan" value={diet} onChange={e=>setDiet(e.target.value)}/></label>
        <label className="ev-check"><input type="checkbox" checked={guests} onChange={e=>setGuests(e.target.checked)}/><span>Bringing additional guests?</span></label>
        <button className="ev-submit" type="submit">Confirm RSVP</button>
      </form>
      {done && (
        <div className="ev-conf">
          <h3>✓ RSVP Submitted</h3>
          <div className="ev-r"><span>Name</span><span>{name}</span></div>
          <div className="ev-r"><span>Email</span><span>{mail}</span></div>
          <div className="ev-r"><span>Attendees</span><span>{attend}</span></div>
          <div className="ev-r"><span>Dietary</span><span>{diet||"None"}</span></div>
          <div className="ev-r"><span>Extra Guests</span><span>{guests?"Yes":"No"}</span></div>
        </div>
      )}
    </div>
  );
}

// 11. Shopping List
const SHOP_ITEMS = ["Apples","Bananas","Strawberries","Blueberries","Mangoes","Pineapple","Lettuce","Broccoli","Paper Towels","Dish Soap"];
function ShoppingListApp() {
  const [q, setQ] = useState("");
  const [sel, setSel] = useState([]);
  const filtered = useMemo(() => SHOP_ITEMS.filter(i => i.toLowerCase().includes(q.toLowerCase())), [q]);
  const toggle = useCallback(item => setSel(p => p.includes(item) ? p.filter(i=>i!==item) : [...p, item]), []);
  return (
    <div className="sl-box">
      <h2>Shopping List</h2>
      <input className="sl-input" type="search" placeholder="Search items…" value={q} onChange={e=>setQ(e.target.value)}/>
      <ul className="sl-list">
        {filtered.map(item => (
          <li key={item} className={sel.includes(item)?'sl-done':''}>
            <label><input type="checkbox" checked={sel.includes(item)} onChange={()=>toggle(item)}/>{item}</label>
          </li>
        ))}
      </ul>
    </div>
  );
}
