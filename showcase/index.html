<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FreeCodeCamp React Projects — Showcase</title>
  <meta name="description" content="11 React mini-projects built during the FreeCodeCamp curriculum — from fundamentals to hooks." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.26.5/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react">
const { useState, useEffect, useMemo, useCallback } = React;

/* ════════════════════════════════════════
   PROJECT COMPONENTS
   ════════════════════════════════════════ */

function ProfileCardApp() {
  const profiles = [
    { id:1, name:"Mark", title:"Front-End Developer", bio:"I like to work with different front-end technologies and play video games." },
    { id:2, name:"Tiffany", title:"Engineering Manager", bio:"I have worked in tech for 15 years and love to help people grow." },
    { id:3, name:"Doug", title:"Back-End Developer", bio:"I have been a software developer for over 20 years. I love Go and Rust." },
  ];
  return (
    <div className="pc-flex">
      {profiles.map(p => <div key={p.id} className="pc-card"><h3>{p.name}</h3><p className="pc-role">{p.title}</p><p className="pc-bio">{p.bio}</p></div>)}
    </div>
  );
}

function FooterApp() {
  return (
    <footer className="ft">
      <div className="ft-cols">
        <ul><li><a href="#">Dashboard</a></li><li><a href="#">Services</a></li></ul>
        <ul><li><a href="#">Videos</a></li><li><a href="#">Discord</a></li></ul>
        <ul><li><a href="#">Privacy Policy</a></li><li><a href="#">Terms</a></li></ul>
      </div>
      <p className="ft-copy">&copy; 2024 Fitness Dashboard. All Rights Reserved.</p>
      <div className="ft-icons"><span>💻</span><span>📧</span><span>📞</span><span>📍</span></div>
    </footer>
  );
}

function NavbarApp() {
  return (
    <nav className="nb">
      <ul>
        <li><a href="#">Dashboard</a></li>
        <li><a href="#">Widgets</a></li>
        <li className="nb-drop">
          <button>Apps ▾</button>
          <ul className="nb-sub"><li><a href="#">Calendar</a></li><li><a href="#">Chat</a></li><li><a href="#">Email</a></li></ul>
        </li>
      </ul>
    </nav>
  );
}

function MoodBoardApp() {
  const items = [
    { color:"#3b82f6", img:"https://cdn.freecodecamp.org/curriculum/labs/pathway.jpg", t:"Peaceful pathway" },
    { color:"#22c55e", img:"https://cdn.freecodecamp.org/curriculum/labs/grass.jpg", t:"Fresh green grass" },
    { color:"#f97316", img:"https://cdn.freecodecamp.org/curriculum/labs/shore.jpg", t:"Beach shore" },
    { color:"#8b5cf6", img:"https://cdn.freecodecamp.org/curriculum/labs/ship.jpg", t:"Adventure at sea" },
    { color:"#ec4899", img:"https://cdn.freecodecamp.org/curriculum/labs/santorini.jpg", t:"Santorini vibes" },
  ];
  return (
    <div className="mb-wrap">
      <h3 className="mb-h">Destination Mood Board</h3>
      <div className="mb-grid">{items.map(i=><div key={i.t} className="mb-card" style={{backgroundColor:i.color}}><img src={i.img} alt={i.t}/><span>{i.t}</span></div>)}</div>
    </div>
  );
}

function ColorPickerApp() {
  const [c, setC] = useState("#6c5ce7");
  return <div className="cp" style={{backgroundColor:c}}><span className="cp-val">{c.toUpperCase()}</span><input type="color" value={c} onChange={e=>setC(e.target.value)}/></div>;
}

function ToggleApp() {
  const [v, setV] = useState(false);
  return <div className="tg"><button className="tg-btn" onClick={()=>setV(!v)}>{v?"Hide":"Show"} Message</button>{v&&<p className="tg-msg">I love freeCodeCamp!</p>}</div>;
}

function FruitSearchApp() {
  const [q, setQ] = useState(''); const [r, setR] = useState([]); const [ld, setLd] = useState(false);
  useEffect(() => {
    if (!q.trim()) { setR([]); return; } setLd(true);
    const t = setTimeout(async()=>{ try { const res=await fetch(`https://fruit-search.freecodecamp.rocks/api/fruits?q=${q}`); const d=await res.json(); setR(d.map(f=>f.name)); } catch{setR([]);} setLd(false); }, 700);
    return ()=>{ clearTimeout(t); setLd(false); };
  }, [q]);
  return (
    <div className="fs">
      <label>Search for fruits:</label>
      <input className="fs-in" type="search" placeholder="Type a fruit name…" value={q} onChange={e=>setQ(e.target.value)}/>
      <div className="fs-res">{ld?<p className="fs-d">Searching…</p>:r.length?r.map(x=><p key={x} className="fs-i">{x}</p>):q.trim()?<p className="fs-d">No results</p>:<p className="fs-d">Start typing…</p>}</div>
    </div>
  );
}

function OTPApp() {
  const [otp, setOtp] = useState(""); const [t, setT] = useState(0);
  useEffect(()=>{ if(!t) return; const id=setInterval(()=>setT(p=>p-1),1000); return()=>clearInterval(id); },[t]);
  return (
    <div className="otp">
      <h3>OTP Generator</h3>
      <div className="otp-code">{otp||"------"}</div>
      <p className="otp-t">{otp?(t>0?`Expires in ${t}s`:"Expired"):""}</p>
      <button className="otp-btn" disabled={t>0} onClick={()=>{setOtp(Math.floor(100000+Math.random()*900000));setT(5);}}>Generate OTP</button>
    </div>
  );
}

function SuperheroApp() {
  const src=["Bitten by creature","Radioactive exposure","Science experiment","Alien heritage","Ancient artifact","Other"];
  const pws=["Super Strength","Super Speed","Flight","Invisibility","Telekinesis","Other"];
  const [h,setH]=useState(""); const [r,setR]=useState(""); const [s,setS]=useState(""); const [p,setP]=useState([]);
  const tog=e=>{const{value,checked}=e.target; setP(checked?[...p,value]:p.filter(x=>x!==value));};
  return (
    <div className="sh">
      <h3>Superhero Application</h3><p className="sh-sub">Complete all fields</p>
      <form onSubmit={e=>e.preventDefault()}>
        <div className="sh-row"><label className="sh-f">Hero Name<input type="text" value={h} onChange={e=>setH(e.target.value)} placeholder="Spider-Man"/></label><label className="sh-f">Real Name<input type="password" value={r} onChange={e=>setR(e.target.value)} placeholder="••••"/></label></div>
        <label className="sh-f">Power Source<select value={s} onChange={e=>setS(e.target.value)}><option value="">Select…</option>{src.map(x=><option key={x}>{x}</option>)}</select></label>
        <fieldset className="sh-fs"><legend>Powers</legend>{pws.map(x=><label key={x} className="sh-cb"><input type="checkbox" value={x} checked={p.includes(x)} onChange={tog}/>{x}</label>)}</fieldset>
        <button className="sh-go" disabled={!h||!r||!s||!p.length}>Join the League</button>
      </form>
    </div>
  );
}

function EventRSVPApp() {
  const [n,sN]=useState(""); const [m,sM]=useState(""); const [a,sA]=useState(1);
  const [d,sD]=useState(""); const [g,sG]=useState(false); const [ok,sOk]=useState(false);
  return (
    <div className="ev">
      <div className="ev-hd"><span className="ev-eye">Event Registration</span><h3>RSVP Form</h3><p>Confirm your attendance below.</p></div>
      <form className="ev-fm" onSubmit={e=>{e.preventDefault();sOk(true);}}>
        <label className="ev-f">Name<input required placeholder="Jane Doe" value={n} onChange={e=>sN(e.target.value)}/></label>
        <label className="ev-f">Email<input required type="email" placeholder="jane@example.com" value={m} onChange={e=>sM(e.target.value)}/></label>
        <label className="ev-f">Attendees<input required type="number" min="1" value={a} onChange={e=>sA(e.target.value)}/></label>
        <label className="ev-f">Dietary <span className="ev-opt">— optional</span><input placeholder="e.g. Vegan" value={d} onChange={e=>sD(e.target.value)}/></label>
        <label className="ev-ck"><input type="checkbox" checked={g} onChange={e=>sG(e.target.checked)}/>Bringing guests?</label>
        <button className="ev-go">Confirm RSVP</button>
      </form>
      {ok&&<div className="ev-ok"><h4>✓ Submitted</h4><div className="ev-r"><span>Name</span><span>{n}</span></div><div className="ev-r"><span>Email</span><span>{m}</span></div><div className="ev-r"><span>Attendees</span><span>{a}</span></div><div className="ev-r"><span>Dietary</span><span>{d||"None"}</span></div><div className="ev-r"><span>Guests</span><span>{g?"Yes":"No"}</span></div></div>}
    </div>
  );
}

const ITEMS=["Apples","Bananas","Strawberries","Blueberries","Mangoes","Pineapple","Lettuce","Broccoli","Paper Towels","Dish Soap"];
function ShoppingListApp() {
  const [q,setQ]=useState(""); const [sel,setSel]=useState([]);
  const filt=useMemo(()=>ITEMS.filter(i=>i.toLowerCase().includes(q.toLowerCase())),[q]);
  const tog=useCallback(i=>setSel(p=>p.includes(i)?p.filter(x=>x!==i):[...p,i]),[]);
  return (
    <div className="sl">
      <h3>Shopping List</h3>
      <input className="sl-in" type="search" placeholder="Search…" value={q} onChange={e=>setQ(e.target.value)}/>
      <ul className="sl-ul">{filt.map(i=><li key={i} className={sel.includes(i)?"sl-x":""}><label><input type="checkbox" checked={sel.includes(i)} onChange={()=>tog(i)}/>{i}</label></li>)}</ul>
    </div>
  );
}


/* ═══════════════════
   PROJECT REGISTRY
   ═══════════════════ */
const PROJECTS = [
  { id:"profile-card", icon:"🪪", title:"Reusable ProfileCard", cat:"fundamentals", desc:"Component composition with props and array mapping for user profiles.", tags:["Props","Array.map","Flexbox"], Comp:ProfileCardApp },
  { id:"footer", icon:"🦶", title:"Reusable Footer", cat:"fundamentals", desc:"Multi-column footer with semantic HTML, navigation links, and social icons.", tags:["Semantic HTML","Components"], Comp:FooterApp },
  { id:"navbar", icon:"🧭", title:"Mega Navbar", cat:"fundamentals", desc:"Navigation with dropdown submenus and ARIA accessibility attributes.", tags:["Navigation","ARIA","Submenus"], Comp:NavbarApp },
  { id:"mood-board", icon:"🎨", title:"Mood Board", cat:"fundamentals", badge:"Lab", desc:"Visual mood board with destination images and color themes via props.", tags:["Props","CSS Grid","Images"], Comp:MoodBoardApp },
  { id:"color-picker", icon:"🖌️", title:"Color Picker", cat:"hooks", badge:"Lab", desc:"Pick a color and watch the background update in real time.", tags:["useState","Controlled Inputs"], Comp:ColorPickerApp },
  { id:"toggle-text", icon:"👁️", title:"Toggle Text", cat:"hooks", desc:"Show/hide a message using boolean state and conditional rendering.", tags:["useState","Conditional Render"], Comp:ToggleApp },
  { id:"fruit-search", icon:"🍎", title:"Fruit Search", cat:"hooks", desc:"Real-time API search with 700ms debounce and error handling.", tags:["useEffect","Fetch API","Debounce"], Comp:FruitSearchApp },
  { id:"otp-generator", icon:"🔐", title:"OTP Generator", cat:"hooks", desc:"Random 6-digit OTP with countdown timer and auto-expiry.", tags:["useEffect","useRef","Timers"], Comp:OTPApp },
  { id:"superhero-form", icon:"🦸", title:"Superhero Form", cat:"hooks", desc:"Multi-input controlled form with validation and checkbox arrays.", tags:["Controlled Forms","Validation"], Comp:SuperheroApp },
  { id:"event-form", icon:"🎟️", title:"Event RSVP", cat:"hooks", badge:"Lab", desc:"Registration form with conditional confirmation summary post-submit.", tags:["Forms","Conditional Render"], Comp:EventRSVPApp },
  { id:"shopping-list", icon:"🛒", title:"Shopping List", cat:"hooks", desc:"Filterable list with useMemo, useCallback, and performance optimization.", tags:["useMemo","useCallback"], Comp:ShoppingListApp },
];


/* ═══════════════════
   MAIN APP
   ═══════════════════ */
function App() {
  const [filter, setFilter] = useState("all");
  const [openId, setOpenId] = useState(null);
  const list = filter === "all" ? PROJECTS : PROJECTS.filter(p => p.cat === filter);

  const handleOpen = (id) => setOpenId(openId === id ? null : id);

  return (
    <>
      <div className="bg-glow" />

      <header className="hero">
        <div className="pill"><span className="pill-dot"/>FreeCodeCamp · React Curriculum</div>
        <h1>React Projects<br/><span className="accent">Showcase</span></h1>
        <p className="hero-sub">11 self-contained mini-projects · 2 learning modules · built from scratch</p>
        <div className="stats">
          <div className="s"><strong>11</strong><span>Projects</span></div>
          <div className="s-div"/>
          <div className="s"><strong>2</strong><span>Modules</span></div>
          <div className="s-div"/>
          <div className="s"><strong>7+</strong><span>Hooks</span></div>
        </div>
      </header>

      <nav className="filters" id="filters">
        {[{k:"all",l:"All"},{k:"fundamentals",l:"Fundamentals",c:"blue"},{k:"hooks",l:"State & Hooks",c:"purple"}].map(f=>(
          <button key={f.k} className={`fb${filter===f.k?" on":""}`} onClick={()=>{setFilter(f.k);setOpenId(null);}}>
            {f.c&&<i className={`fd fd-${f.c}`}/>}{f.l}
          </button>
        ))}
      </nav>

      <main className="grid">
        {list.map((p,i)=>{
          const isOpen = openId === p.id;
          const C = p.Comp;
          return (
            <section key={p.id} className={`card${isOpen?" open":""}`} style={{"--d":`${i*50}ms`}} id={`project-${p.id}`}>
              <div className="card-top" onClick={()=>handleOpen(p.id)}>
                <div className="card-left">
                  <span className="card-ico">{p.icon}</span>
                  <div className="card-info">
                    <span className={`label label-${p.cat}`}>{p.cat==="fundamentals"?"Fundamentals":"Hooks"}{p.badge?` · ${p.badge}`:""}</span>
                    <h2>{p.title}</h2>
                  </div>
                </div>
                <svg className={`chevron${isOpen?" flip":""}`} width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M5 8l5 5 5-5" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>
              </div>
              <p className="card-desc">{p.desc}</p>
              <div className="card-tags">{p.tags.map(t=><span key={t} className="chip">{t}</span>)}</div>
              {isOpen && (
                <div className="preview">
                  <div className="prev-bar"><div className="dots"><i/><i/><i/></div><span className="prev-lbl">Live Preview</span></div>
                  <div className={`prev-body proj-${p.id}`}><C/></div>
                </div>
              )}
            </section>
          );
        })}
      </main>

      <footer className="foot"><div className="foot-line"/><p>Built with ❤️ by <strong>Loki</strong> · FreeCodeCamp React Curriculum</p></footer>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
