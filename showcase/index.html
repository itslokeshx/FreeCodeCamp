// ─── 7. Fruit Search ───
function FruitSearchApp() {
  const [query, setQuery] = useState('');
  const [results, setResults] = useState([]);

  useEffect(() => {
    if (query.trim() === '') { setResults([]); return; }
    const timeoutId = setTimeout(async () => {
      try {
        const res = await fetch(`https://fruit-search.freecodecamp.rocks/api/fruits?q=${query}`);
        const data = await res.json();
        setResults(data.map(f => f.name));
      } catch (err) { console.error(err); }
    }, 700);
    return () => clearTimeout(timeoutId);
  }, [query]);

  return (
    <div className="fs-container">
      <form onSubmit={(e) => e.preventDefault()}>
        <label htmlFor="fs-input">Search for fruits:</label>
        <input id="fs-input" className="fs-input" type="search" value={query} onChange={(e) => setQuery(e.target.value)} />
      </form>
      <div className="fs-results">
        {results.length > 0 ? results.map(item => <p key={item} className="fs-item">{item}</p>) : <p>No results found</p>}
      </div>
    </div>
  );
}

// ─── 8. OTP Generator ───
function OTPApp() {
  const [otp, setOtp] = useState("");
  const [time, setTime] = useState(0);

  function generate() { setOtp(Math.floor(100000 + Math.random() * 900000)); setTime(5); }

  useEffect(() => {
    if (time === 0) return;
    const interval = setInterval(() => setTime(p => p - 1), 1000);
    return () => clearInterval(interval);
  }, [time]);

  return (
    <div className="otp-container">
      <h1 className="otp-title">OTP Generator</h1>
      <h2 className="otp-display">{otp ? otp : "Click 'Generate OTP' to get a code"}</h2>
      <p className="otp-timer" aria-live="assertive">
        {otp ? (time > 0 ? ` Expires in: ${time} seconds` : "OTP expired. Click the button to generate a new OTP.") : ""}
      </p>
      <button className="otp-btn" onClick={generate} disabled={time > 0}>Generate OTP</button>
    </div>
  );
}

// ─── 9. Superhero Form ───
function SuperheroApp() {
  const powerSourceOptions = ["Bitten by a strange creature","Radioactive exposure","Science experiment","Alien heritage","Ancient artifact discovery","Other"];
  const powersOptions = ["Super Strength","Super Speed","Flight","Invisibility","Telekinesis","Other"];
  const [heroName, setHeroName] = useState("");
  const [realName, setRealName] = useState("");
  const [powerSource, setPowerSource] = useState("");
  const [powers, setPowers] = useState([]);

  const handlePowersChange = (e) => {
    const { value, checked } = e.target;
    setPowers(checked ? [...powers, value] : powers.filter(p => p !== value));
  };

  return (
    <div className="sh-wrap">
      <h2>Superhero Application Form</h2>
      <p>Please complete all fields</p>
      <form onSubmit={(e) => e.preventDefault()}>
        <div className="sh-section">
          <label>Hero Name<input type="text" value={heroName} onChange={(e) => setHeroName(e.target.value)} /></label>
          <label>Real Name<input type="password" value={realName} onChange={(e) => setRealName(e.target.value)} /></label>
        </div>
        <label className="sh-section sh-column">How did you get your powers?
          <select value={powerSource} onChange={(e) => setPowerSource(e.target.value)}>
            <option value="">Select one</option>
            {powerSourceOptions.map(s => <option key={s} value={s}>{s}</option>)}
          </select>
        </label>
        <label className="sh-section sh-column">List your powers:
          {powersOptions.map(pw => (
            <label key={pw}><input type="checkbox" value={pw} checked={powers.includes(pw)} onChange={handlePowersChange} /><span>{pw}</span></label>
          ))}
        </label>
        <button className="sh-btn" type="submit" disabled={!heroName || !realName || !powerSource || powers.length===0}>Join the League</button>
      </form>
    </div>
  );
}

// ─── 10. Event RSVP Form ───
function EventRSVPApp() {
  const [name, setName] = useState(""); const [mail, setMail] = useState("");
  const [attend, setAttend] = useState(0); const [diet, setDiet] = useState("");
  const [check, setCheck] = useState(false); const [submit, setSubmit] = useState(false);

  return (
    <div className="ev-wrapper">
      <div className="ev-card">
        <div className="ev-header">
          <div className="ev-eyebrow">Event Registration</div>
          <div className="ev-title">RSVP Form</div>
          <div className="ev-subtitle">Fill in your details to confirm attendance.</div>
        </div>
        <div className="ev-body">
          <form onSubmit={(e) => { e.preventDefault(); setSubmit(true); }}>
            <div className="ev-field"><label>Name</label><input required type="text" placeholder="Jane Doe" value={name} onChange={(e) => setName(e.target.value)} /></div>
            <div className="ev-field"><label>Email</label><input type="email" required placeholder="jane@example.com" value={mail} onChange={(e) => setMail(e.target.value)} /></div>
            <div className="ev-field"><label>Number of Attendees</label><input type="number" required min="1" placeholder="1" value={attend} onChange={(e) => setAttend(e.target.value)} /></div>
            <div className="ev-field"><label>Dietary Preferences <span>— optional</span></label><input type="text" placeholder="e.g. Vegan" value={diet} onChange={(e) => setDiet(e.target.value)} /></div>
            <div className="ev-divider"></div>
            <label className="ev-checkbox"><input type="checkbox" onChange={(e) => setCheck(e.target.checked)} /><span>Bringing additional guests?</span></label>
            <button type="submit" className="ev-submit-btn">Confirm RSVP</button>
          </form>
        </div>
        {submit && (
          <div className="ev-confirmation">
            <div className="ev-conf-title">RSVP Submitted</div>
            <div className="ev-conf-row"><span className="ev-conf-key">Name</span><span className="ev-conf-val">{name}</span></div>
            <div className="ev-conf-row"><span className="ev-conf-key">Email</span><span className="ev-conf-val">{mail}</span></div>
            <div className="ev-conf-row"><span className="ev-conf-key">Attendees</span><span className="ev-conf-val">{attend}</span></div>
            <div className="ev-conf-row"><span className="ev-conf-key">Dietary</span><span className="ev-conf-val">{diet || "None"}</span></div>
            <div className="ev-conf-row"><span className="ev-conf-key">Extra Guests</span><span className="ev-conf-val">{check ? "Yes" : "No"}</span></div>
          </div>
        )}
      </div>
    </div>
  );
}

// ─── 11. Shopping List ───
const shoppingItems = ["Apples","Bananas","Strawberries","Blueberries","Mangoes","Pineapple","Lettuce","Broccoli","Paper Towels","Dish Soap"];

function ShoppingListApp() {
  const [query, setQuery] = useState("");
  const [selectedItems, setSelectedItems] = useState([]);
  const filteredItems = useMemo(() => shoppingItems.filter(i => i.toLowerCase().includes(query.toLowerCase())), [query]);
  const toggleItem = useCallback((item) => {
    setSelectedItems(prev => prev.includes(item) ? prev.filter(i => i !== item) : [...prev, item]);
  }, []);

  return (
    <div className="sl-container">
      <h1>Shopping List</h1>
      <form>
        <label htmlFor="sl-search">Search for an item:</label>
        <input id="sl-search" className="sl-input" type="search" placeholder="Search..." value={query} onChange={(e) => setQuery(e.target.value)} />
        <ul className="sl-list">
          {filteredItems.map(item => {
            const isChecked = selectedItems.includes(item);
            return (
              <li key={item} style={{ textDecoration: isChecked ? "line-through" : "none" }}>
                <label><input type="checkbox" onChange={() => toggleItem(item)} checked={isChecked} />{item}</label>
              </li>
            );
          })}
        </ul>
      </form>
    </div>
  );
}

function ProjectCard({ project, isExpanded, onToggle }) {
  const Comp = project.component;
  return (
    <article className={`project-card ${isExpanded ? 'expanded' : ''}`} id={`project-${project.id}`}>
      <div className="card-top" onClick={onToggle}>
        <div className="card-header">
          <div className="card-icon">{project.icon}</div>
          <div className="card-meta">
            <span className={`card-tag ${project.category === 'fundamentals' ? 'tag-fundamentals' : 'tag-hooks'}`}>
              {project.category === 'fundamentals' ? 'Fundamentals' : 'Hooks'}{project.badge ? ` · ${project.badge}` : ''}
            </span>
            <h2 className="card-title">{project.title}</h2>
          </div>
          <div className={`card-chevron ${isExpanded ? 'open' : ''}`}>▾</div>
        </div>
        <p className="card-desc">{project.desc}</p>
        <div className="card-concepts">
          {project.concepts.map(c => <span key={c} className="concept">{c}</span>)}
        </div>
      </div>
      {isExpanded && (
        <div className="card-preview">
          <div className="preview-bar">
            <div className="mac-dots"><span></span><span></span><span></span></div>
            <span className="preview-label">Live Preview</span>
          </div>
          <div className={`preview-content proj-${project.id}`}>
            <Comp />
          </div>
        </div>
      )}
    </article>
  );
}

function App() {
  const [filter, setFilter] = useState("all");
  const [expanded, setExpanded] = useState({});

  const toggleExpand = (id) => {
    setExpanded(prev => ({ ...prev, [id]: !prev[id] }));
  };

  const filtered = filter === "all" ? PROJECTS : PROJECTS.filter(p => p.category === filter);

  return (
    <>
      {/* Background Orbs */}
      <div className="bg-orbs" aria-hidden="true">
        <div className="orb orb-1"></div>
        <div className="orb orb-2"></div>
        <div className="orb orb-3"></div>
      </div>

      {/* Hero */}
      <header className="hero">
        <div className="hero-badge">
          <span className="hero-badge-dot"></span>
          FreeCodeCamp · React Curriculum
        </div>
        <h1 className="hero-title">React Projects<br /><span className="hero-gradient">Showcase</span></h1>
        <p className="hero-sub">11 self-contained mini-projects · 2 learning modules · built from scratch</p>
        <div className="hero-stats">
          <div className="stat"><div className="stat-num">11</div><div className="stat-label">Projects</div></div>
          <div className="stat-divider"></div>
          <div className="stat"><div className="stat-num">2</div><div className="stat-label">Modules</div></div>
          <div className="stat-divider"></div>
          <div className="stat"><div className="stat-num">7+</div><div className="stat-label">React Hooks</div></div>
        </div>
      </header>

      {/* Filters */}
      <nav className="filter-bar">
        {[{key:"all",label:"All Projects"},{key:"fundamentals",label:"Fundamentals",dot:"dot-blue"},{key:"hooks",label:"State & Hooks",dot:"dot-purple"}].map(f => (
          <button key={f.key} className={`filter-btn ${filter === f.key ? 'active' : ''}`} onClick={() => setFilter(f.key)}>
            {f.dot && <span className={`filter-dot ${f.dot}`}></span>}
            {f.label}
          </button>
        ))}
      </nav>

      {/* Grid */}
      <main className="projects-container">
        {filtered.map(p => (
          <ProjectCard key={p.id} project={p} isExpanded={!!expanded[p.id]} onToggle={() => toggleExpand(p.id)} />
        ))}
      </main>

      {/* Footer */}

        <div className="footer-line"></div>
        <p>Built with ❤️ by <strong>Loki</strong> · FreeCodeCamp React Curriculum</p>
      </footer>

}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
