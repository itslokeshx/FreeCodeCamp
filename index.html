<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Roadmap</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@300;400;500&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap"
      rel="stylesheet"
    />
    <style>
      *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
      :root{
        --bg:#111111;--bg2:#181818;--bg3:#202020;--border:#2a2a2a;--border2:#333333;
        --text:#ffffff;--text2:#e4e4e7;--text3:#a1a1aa;--done-bg:#1c1c1c;--done-text:#71717a;
        --topbar-bg:rgba(15,15,15,0.95);--accent:#ffffff;--check-fill:#111111;
        --easy:#22c55e;--med:#f59e0b;--hard:#ef4444;
      }
      html.light{
        --bg:#fafafa;--bg2:#f4f4f4;--bg3:#eeeeee;--border:#e2e2e2;--border2:#d0d0d0;
        --text:#0a0a0a;--text2:#27272a;--text3:#52525b;--done-bg:#efefef;--done-text:#9ca3af;
        --topbar-bg:rgba(250,250,250,0.95);--accent:#0a0a0a;--check-fill:#ffffff;
        --easy:#16a34a;--med:#d97706;--hard:#dc2626;
      }
      html{scroll-behavior:smooth;transition:background 0.2s}
      body{background:var(--bg);color:var(--text);font-family:"DM Sans",sans-serif;font-size:17px;line-height:1.7;min-height:100vh;-webkit-font-smoothing:antialiased}

      /* SIDEBAR */
      .sidebar{position:fixed;top:0;left:0;width:230px;height:100vh;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:100;overflow-y:auto}
      .sidebar::-webkit-scrollbar{width:0}
      .sb-brand{padding:24px 20px 20px;border-bottom:1px solid var(--border)}
      .sb-name{font-size:14.5px;font-weight:600;color:var(--text);letter-spacing:.01em}
      .sb-goal{font-size:12px;color:var(--text3);font-family:"Geist Mono",monospace;margin-top:2px}
      .sb-nav{flex:1;padding:10px 8px;overflow-y:auto}
      .sb-nav::-webkit-scrollbar{width:0}
      .nav-item{display:flex;align-items:center;gap:8px;padding:6px 12px;border-radius:6px;cursor:pointer;font-size:14px;color:var(--text2);text-decoration:none;margin-bottom:1px;transition:background .12s,color .12s}
      .nav-item:hover{background:var(--bg3);color:var(--text)}
      .nav-num{font-family:"Geist Mono",monospace;font-size:10.5px;opacity:.7;width:14px;flex-shrink:0}
      .nav-label{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
      .nav-pct{font-family:"Geist Mono",monospace;font-size:10.5px;opacity:.65}
      .sb-footer{padding:14px 20px 20px;border-top:1px solid var(--border)}
      .sb-overall-label{font-family:"Geist Mono",monospace;font-size:10.5px;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px}
      .overall-bar{height:2px;background:var(--border2);border-radius:2px;overflow:hidden;margin-bottom:5px}
      .overall-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .4s ease}
      .overall-pct{font-family:"Geist Mono",monospace;font-size:13.5px;color:var(--text);font-weight:500}

      /* TOPBAR */
      .main{margin-left:230px;min-height:100vh}
      .topbar{position:sticky;top:0;background:var(--topbar-bg);backdrop-filter:blur(14px);border-bottom:1px solid var(--border);padding:12px 40px;display:flex;align-items:center;justify-content:space-between;z-index:50}
      .topbar-title{font-size:13.5px;font-weight:500;color:var(--text2)}
      .topbar-right{display:flex;align-items:center;gap:10px}
      .topbar-count{font-family:"Geist Mono",monospace;font-size:12.5px;color:var(--text3)}
      .tb-btn{font-size:12.5px;color:var(--text3);background:none;border:1px solid var(--border2);border-radius:5px;padding:3px 10px;cursor:pointer;font-family:"DM Sans",sans-serif;transition:all .15s;white-space:nowrap}
      .tb-btn:hover{border-color:var(--text2);color:var(--text)}
      .theme-btn{padding:3px 8px;font-size:14.5px}

      /* CONTENT */
      .content{padding:44px 40px 100px;max-width:820px}

      /* HERO */
      .hero{margin-bottom:44px;padding-bottom:32px;border-bottom:1px solid var(--border)}
      .hero-eyebrow{font-family:"Geist Mono",monospace;font-size:10.5px;color:var(--text3);letter-spacing:.14em;text-transform:uppercase;margin-bottom:10px}
      .hero-title{font-size:26px;font-weight:600;letter-spacing:-.02em;line-height:1.2;margin-bottom:6px}
      .hero-sub{font-size:14px;color:var(--text2);font-style:italic}
      .meta-row{display:flex;gap:28px;margin-top:20px;flex-wrap:wrap}
      .meta-item{display:flex;flex-direction:column;gap:2px}
      .meta-lbl{font-size:10.5px;font-family:"Geist Mono",monospace;color:var(--text3);text-transform:uppercase;letter-spacing:.1em}
      .meta-val{font-size:14.5px;font-weight:500;color:var(--text)}

      /* CHUNK */
      .chunk{margin-bottom:0;scroll-margin-top:72px}
      .chunk-divider{border:none;border-top:1px solid var(--border);margin:36px 0}
      .chunk-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:18px;gap:16px}
      .chunk-eyebrow{font-family:"Geist Mono",monospace;font-size:10.5px;color:var(--text3);letter-spacing:.12em;text-transform:uppercase;margin-bottom:4px}
      .chunk-title{font-size:16.5px;font-weight:600;letter-spacing:-.01em;color:var(--text);margin-bottom:2px}
      .chunk-goal{font-size:14px;color:var(--text2);font-style:italic}
      .chunk-meta{display:flex;align-items:center;gap:6px;margin-top:7px;flex-wrap:wrap}
      .chunk-tag{font-family:"Geist Mono",monospace;font-size:10.5px;color:var(--text3);border:1px solid var(--border2);border-radius:4px;padding:1px 6px}
      .chunk-tag a{color:inherit;text-decoration:none}
      .chunk-tag a:hover{color:var(--text)}
      .chunk-right{text-align:right;flex-shrink:0}
      .chunk-pct-num{font-family:"Geist Mono",monospace;font-size:17.5px;font-weight:500;color:var(--text);line-height:1;margin-bottom:5px}
      .chunk-bar{width:72px;height:2px;background:var(--border2);border-radius:2px;overflow:hidden;margin-left:auto}
      .chunk-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .4s ease}

      /* SECTION */
      .section-block{margin-bottom:8px}
      .section-header{display:flex;align-items:center;justify-content:space-between;padding:7px 0 5px;cursor:pointer;user-select:none}
      .section-header:hover .section-title{color:var(--text)}
      .section-title-wrap{display:flex;align-items:center;gap:8px}
      .section-icon{font-family:"Geist Mono",monospace;font-size:9.5px;color:var(--text3);width:12px;flex-shrink:0}
      .section-title{font-size:13.5px;font-weight:500;color:var(--text2);letter-spacing:.02em;transition:color .12s}
      .section-badge{font-family:"Geist Mono",monospace;font-size:10px;color:var(--text3);background:var(--bg3);border-radius:3px;padding:1px 5px;border:1px solid var(--border2)}
      .section-count{font-family:"Geist Mono",monospace;font-size:10.5px;color:var(--text3)}
      .section-items{padding-left:4px}

      /* STEP */
      .step-item{display:flex;align-items:center;gap:8px;padding:5px 8px;border-radius:5px;cursor:pointer;transition:background .1s;margin-bottom:1px}
      .step-item:hover{background:var(--bg2)}
      .step-item.done .step-label{color:var(--done-text);text-decoration:line-through;text-decoration-color:var(--border2)}
      .step-check{width:13px;height:13px;border:1.5px solid var(--border2);border-radius:3px;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .14s}
      .step-item.done .step-check{background:var(--accent);border-color:var(--accent)}
      .step-check .ck{display:none}
      .step-item.done .step-check .ck{display:block}
      .step-label{font-size:14.5px;color:var(--text2)}

      /* TASK */
      .task-item{display:flex;align-items:flex-start;gap:10px;padding:8px 10px;border-radius:7px;cursor:pointer;transition:background .1s;margin-bottom:1px;border:1px solid transparent}
      .task-item:hover{background:var(--bg2);border-color:var(--border)}
      .task-item.done{background:var(--done-bg)}
      .task-item.done .task-main{color:var(--done-text);text-decoration:line-through;text-decoration-color:var(--border2)}
      .task-item.done .task-sub{color:var(--done-text);opacity:.75}
      .task-item.done .task-date{color:var(--done-text)}
      .task-check{width:15px;height:15px;border:1.5px solid var(--border2);border-radius:4px;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:all .14s}
      .task-item.done .task-check{background:var(--accent);border-color:var(--accent)}
      .task-check .ck{display:none}
      .task-item.done .task-check .ck{display:block}
      .task-body{flex:1;min-width:0}
      .task-main{font-size:15.5px;color:var(--text);line-height:1.45}
      .task-sub{font-size:13.5px;color:var(--text2);margin-top:2px;line-height:1.4}
      .task-date{font-family:"Geist Mono",monospace;font-size:11px;color:var(--text3);flex-shrink:0;margin-top:2px;white-space:nowrap}

      /* CAPSTONE */
      .week-label{font-family:"Geist Mono",monospace;font-size:10.5px;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;padding:14px 0 6px 2px}
      .capstone-block{border:1px solid var(--border);border-radius:9px;overflow:hidden;margin-bottom:8px}
      .capstone-header{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;background:var(--bg2);flex-wrap:wrap;gap:8px}
      .capstone-left{display:flex;align-items:center;gap:10px}
      .capstone-icon{font-size:14.5px}
      .capstone-eyebrow{font-family:"Geist Mono",monospace;font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:1px}
      .capstone-name{font-size:15px;font-weight:600;color:var(--text)}
      .capstone-ticks{display:flex;gap:6px;flex-wrap:wrap}
      .cap-tick{display:flex;align-items:center;gap:5px;font-size:12.5px;color:var(--text2);cursor:pointer;padding:4px 9px;border-radius:5px;border:1px solid var(--border);background:var(--bg3);transition:all .14s;white-space:nowrap}
      .cap-tick:hover{border-color:var(--text3)}
      .cap-tick.done{background:var(--accent);border-color:var(--accent);color:var(--check-fill)}
      .ck-sm{width:12px;height:12px;border:1.5px solid currentColor;border-radius:3px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
      .cap-tick.done .ck-sm{border-color:transparent}

      /* DSA SECTION */
      .dsa-phase-banner{
        background:var(--bg2);border:1px solid var(--border);border-radius:10px;
        padding:14px 18px;margin-bottom:16px;margin-top:8px;
      }
      .dsa-phase-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;gap:12px;flex-wrap:wrap}
      .dsa-phase-left{display:flex;align-items:center;gap:10px}
      .dsa-phase-num{
        font-family:"Geist Mono",monospace;font-size:11px;font-weight:500;
        background:var(--bg3);border:1px solid var(--border2);border-radius:5px;
        padding:2px 8px;color:var(--text3)
      }
      .dsa-phase-title{font-size:15px;font-weight:600;color:var(--text)}
      .dsa-phase-goal{font-size:12.5px;color:var(--text3);font-style:italic}
      .dsa-phase-bar-wrap{display:flex;align-items:center;gap:8px;margin-top:8px}
      .dsa-phase-bar{flex:1;height:2px;background:var(--border2);border-radius:2px;overflow:hidden}
      .dsa-phase-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .4s ease}
      .dsa-phase-pct{font-family:"Geist Mono",monospace;font-size:10.5px;color:var(--text3)}

      .dsa-starter-box{
        border:1px solid var(--border);border-radius:9px;overflow:hidden;margin-bottom:20px;
      }
      .dsa-starter-hd{
        background:var(--bg2);border-bottom:1px solid var(--border);
        padding:10px 14px;display:flex;align-items:center;gap:8px;
      }
      .dsa-starter-hd-title{font-family:"Geist Mono",monospace;font-size:11.5px;font-weight:500;color:var(--text)}
      .dsa-starter-body{padding:10px 14px;display:flex;flex-wrap:wrap;gap:6px}
      .dsa-pill{
        font-family:"Geist Mono",monospace;font-size:11px;
        border:1px solid var(--border2);border-radius:4px;padding:2px 8px;
        color:var(--text3);background:var(--bg3);text-decoration:none;
        transition:all .13s;display:inline-block;
      }
      .dsa-pill:hover{border-color:var(--text2);color:var(--text)}
      .dsa-pill.yt{border-color:#3f2323;color:#f87171}
      .dsa-pill.yt:hover{border-color:#f87171}

      .dsa-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:10px}
      .dsa-card{border:1px solid var(--border);border-radius:9px;overflow:hidden}
      .dsa-card-header{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;background:var(--bg2);border-bottom:1px solid var(--border)}
      .dsa-card-title{font-family:"Geist Mono",monospace;font-size:11.5px;font-weight:500;color:var(--text)}
      .dsa-card-count{font-family:"Geist Mono",monospace;font-size:10.5px;color:var(--text3)}
      .dsa-items{padding:6px 8px}
      .dsa-item{display:flex;align-items:center;gap:8px;padding:5px 6px;border-radius:5px;cursor:pointer;transition:background .1s}
      .dsa-item:hover{background:var(--bg3)}
      .dsa-item.done .dsa-label{color:var(--done-text);text-decoration:line-through;text-decoration-color:var(--border2)}
      .dsa-check{width:13px;height:13px;border:1.5px solid var(--border2);border-radius:3px;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .14s}
      .dsa-item.done .dsa-check{background:var(--accent);border-color:var(--accent)}
      .dsa-check .ck{display:none}
      .dsa-item.done .dsa-check .ck{display:block}
      .dsa-label{font-size:13.5px;color:var(--text2);flex:1;min-width:0}
      .diff-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-left:auto}
      .diff-e{background:var(--easy)}
      .diff-m{background:var(--med)}
      .diff-h{background:var(--hard)}

      .dsa-pattern-row{
        display:flex;align-items:center;justify-content:space-between;
        padding:6px 10px;border-radius:6px;cursor:pointer;
        transition:background .1s;margin-bottom:1px;
        border:1px solid transparent;
      }
      .dsa-pattern-row:hover{background:var(--bg2);border-color:var(--border)}
      .dsa-pattern-row.done .dsa-label{color:var(--done-text);text-decoration:line-through;text-decoration-color:var(--border2)}
      .dsa-prow-left{display:flex;align-items:center;gap:8px;flex:1;min-width:0}
      .lc-link{
        font-family:"Geist Mono",monospace;font-size:10px;color:var(--text3);
        border:1px solid var(--border2);border-radius:3px;padding:1px 5px;
        text-decoration:none;white-space:nowrap;flex-shrink:0;
        transition:all .13s;
      }
      .lc-link:hover{color:var(--text);border-color:var(--text3)}

      .dsa-stats-row{
        display:flex;gap:16px;flex-wrap:wrap;margin-bottom:20px;
      }
      .dsa-stat-box{
        flex:1;min-width:100px;background:var(--bg2);border:1px solid var(--border);
        border-radius:8px;padding:10px 14px;
      }
      .dsa-stat-lbl{font-family:"Geist Mono",monospace;font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:3px}
      .dsa-stat-val{font-family:"Geist Mono",monospace;font-size:18px;font-weight:500;color:var(--text)}
      .dsa-stat-sub{font-size:11px;color:var(--text3);margin-top:1px}

      .ck{pointer-events:none}

      /* MOBILE */
      .mobile-menu-btn{display:none;background:none;border:none;color:var(--text);font-size:21.5px;cursor:pointer;padding:0}
      .topbar-left{display:flex;align-items:center;gap:12px}
      .sidebar-overlay{display:none}

      @media(max-width:700px){
        .sidebar{transform:translateX(-100%);transition:transform .3s ease}
        .sidebar.open{transform:translateX(0)}
        .sidebar-overlay{display:block;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.6);z-index:90;opacity:0;pointer-events:none;transition:opacity .3s ease}
        .sidebar-overlay.open{opacity:1;pointer-events:auto}
        .mobile-menu-btn{display:block}
        .main{margin-left:0}
        .content{padding:24px 18px 60px}
        .dsa-grid{grid-template-columns:1fr}
        .topbar{padding:11px 18px;gap:12px}
      }
    </style>
  </head>
  <body>
    <nav class="sidebar">
      <div class="sb-brand">
        <div class="sb-name">Loki</div>
        <div class="sb-goal">Internship · July 2026</div>
      </div>
      <div class="sb-nav" id="sbNav"></div>
      <div class="sb-footer">
        <div class="sb-overall-label">Overall Progress</div>
        <div class="overall-bar"><div class="overall-fill" id="overallFill" style="width:0%"></div></div>
        <div class="overall-pct" id="overallPct">0%</div>
      </div>
    </nav>
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

    <main class="main">
      <div class="topbar">
        <div class="topbar-left">
          <button class="mobile-menu-btn" onclick="toggleSidebar()">☰</button>
          <div class="topbar-title">MERN + DSA · Internship Roadmap</div>
        </div>
        <div class="topbar-right">
          <div class="topbar-count" id="topCount">0 / 0 done</div>
          <button class="tb-btn" onclick="confirmReset()">Reset</button>
          <button class="tb-btn theme-btn" id="themeBtn" onclick="toggleTheme()">☀︎</button>
        </div>
      </div>
      <div class="content">
        <div class="hero">
          <div class="hero-eyebrow">Progress Tracker · 2026</div>
          <div class="hero-title">Internship Ready<br/>by July 2026.</div>
          <div class="hero-sub">No action faking. No skipping. Just work.</div>
          <div class="meta-row">
            <div class="meta-item"><div class="meta-lbl">User</div><div class="meta-val">Loki</div></div>
            <div class="meta-item"><div class="meta-lbl">Stack</div><div class="meta-val">MERN + DSA</div></div>
            <div class="meta-item"><div class="meta-lbl">Chunks</div><div class="meta-val">8</div></div>
            <div class="meta-item"><div class="meta-lbl">Deadline</div><div class="meta-val">Jul 2026</div></div>
          </div>
        </div>
        <div id="chunksRoot"></div>
      </div>
    </main>

    <script>
const CK15=`<svg class="ck" width="9" height="7" viewBox="0 0 9 7" fill="none"><path d="M1 3.5L3.5 6L8 1" stroke="var(--check-fill)" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
const CK13=`<svg class="ck" width="8" height="6" viewBox="0 0 8 6" fill="none"><path d="M1 3L3 5L7 1" stroke="var(--check-fill)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
const CK11=`<svg class="ck" width="7" height="5" viewBox="0 0 7 5" fill="none"><path d="M1 2.5L2.8 4.5L6 1" stroke="var(--check-fill)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>`;

// difficulty: e=easy, m=medium, h=hard
// lc = leetcode problem number
const DSA_PHASES = [
  {
    id:"ph1", num:"Phase 1", title:"Foundations", goal:"C++ STL + Big-O. Get comfortable before patterns.",
    weeks:"Week 1–2 · ~20 problems",
    groups:[
      { id:"ph1_arr", title:"Arrays & Prefix Sum", pattern:"Prefix Sum",
        items:[
          {id:"d_1",  label:"Two Sum",                          lc:"1",   diff:"e"},
          {id:"d_2",  label:"Best Time to Buy & Sell Stock",    lc:"121", diff:"e"},
          {id:"d_3",  label:"Contains Duplicate",               lc:"217", diff:"e"},
          {id:"d_4",  label:"Product of Array Except Self",     lc:"238", diff:"m"},
          {id:"d_5",  label:"Maximum Subarray (Kadane)",        lc:"53",  diff:"m"},
          {id:"d_6",  label:"Maximum Product Subarray",         lc:"152", diff:"m"},
          {id:"d_7",  label:"Find Min in Rotated Sorted Array", lc:"153", diff:"m"},
          {id:"d_8",  label:"Range Sum Query — Immutable",      lc:"303", diff:"e"},
          {id:"d_9",  label:"Subarray Sum Equals K",            lc:"560", diff:"m"},
          {id:"d_10", label:"Running Sum of 1D Array",          lc:"1480",diff:"e"},
        ]
      },
      { id:"ph1_str", title:"Strings & Hashing", pattern:"HashMap",
        items:[
          {id:"d_11", label:"Valid Palindrome",                 lc:"125", diff:"e"},
          {id:"d_12", label:"Valid Anagram",                    lc:"242", diff:"e"},
          {id:"d_13", label:"Group Anagrams",                   lc:"49",  diff:"m"},
          {id:"d_14", label:"Longest Common Prefix",            lc:"14",  diff:"e"},
          {id:"d_15", label:"Encode & Decode Strings",          lc:"271", diff:"m"},
          {id:"d_16", label:"Majority Element",                 lc:"169", diff:"e"},
          {id:"d_17", label:"Happy Number",                     lc:"202", diff:"e"},
          {id:"d_18", label:"First Unique Char in String",      lc:"387", diff:"e"},
          {id:"d_19", label:"Isomorphic Strings",               lc:"205", diff:"e"},
          {id:"d_20", label:"Longest Palindrome",               lc:"409", diff:"e"},
        ]
      },
    ]

function getAllDsaIds(){
  const ids=[];
  DSA_PHASES.forEach(ph=>ph.groups.forEach(g=>g.items.forEach(i=>ids.push(i.id))));
  return ids;
}
function getAllIds(chunk){
  const ids=[];
  if(chunk.type==="fcc"||chunk.type==="odin"){
    chunk.sections.forEach(s=>s.items.forEach(i=>ids.push(i.id)));
    (chunk.capstones||[]).forEach(c=>{ids.push(c.tick1.id);ids.push(c.tick2.id)});
  }else if(chunk.type==="tasks"){
    (chunk.tasks||[]).forEach(t=>ids.push(t.id));
    (chunk.capstones||[]).forEach(c=>{ids.push(c.tick1.id);ids.push(c.tick2.id)});
  }else if(chunk.type==="dsa"){
    getAllDsaIds().forEach(id=>ids.push(id));
  }
  return ids;
}
function chunkProg(chunk){
  const ids=getAllIds(chunk);
  const done=ids.filter(id=>S[id]).length;
  return{done,total:ids.length,pct:ids.length?Math.round(done/ids.length*100):0};
}
function overallProg(){
  const all=CHUNKS.flatMap(getAllIds);
  const done=all.filter(id=>S[id]).length;
  return{done,total:all.length,pct:all.length?Math.round(done/all.length*100):0};
}
function phaseProg(ph){
  const ids=[];
  ph.groups.forEach(g=>g.items.forEach(i=>ids.push(i.id)));
  const done=ids.filter(id=>S[id]).length;
  return{done,total:ids.length,pct:ids.length?Math.round(done/ids.length*100):0};
}
function dsaTotal(){
  const ids=getAllDsaIds();
  const done=ids.filter(id=>S[id]).length;
  return{done,total:ids.length,easy:ids.filter(id=>getDiff(id)==="e"&&S[id]).length,med:ids.filter(id=>getDiff(id)==="m"&&S[id]).length,hard:ids.filter(id=>getDiff(id)==="h"&&S[id]).length};
}
function getDiff(id){
  for(const ph of DSA_PHASES)for(const g of ph.groups)for(const item of g.items)if(item.id===id)return item.diff;
  return"e";
}

  <div class="dsa-starter-body">
    <a class="dsa-pill" href="https://cppreference.com" target="_blank">cppreference.com</a>
    <a class="dsa-pill" href="https://leetcode.com/studyplan/top-100-liked/" target="_blank">LC Top 100</a>
    <a class="dsa-pill" href="https://neetcode.io/roadmap" target="_blank">NeetCode Roadmap</a>
    <a class="dsa-pill" href="https://seanprashad.com/leetcode-patterns/" target="_blank">LC Patterns</a>
    <a class="dsa-pill" href="https://visualgo.net" target="_blank">VisuAlgo</a>
    <a class="dsa-pill yt" href="https://www.youtube.com/@NeetCode" target="_blank">▶ NeetCode YT</a>
    <a class="dsa-pill yt" href="https://www.youtube.com/@takeUforward" target="_blank">▶ Striver (TUF)</a>
    <a class="dsa-pill yt" href="https://www.youtube.com/@Abdul_Bari" target="_blank">▶ Abdul Bari</a>
    <a class="dsa-pill" href="https://www.bigocheatsheet.com/" target="_blank">Big-O Cheatsheet</a>
    <a class="dsa-pill" href="https://github.com/seanprashad/leetcode-patterns" target="_blank">GitHub Patterns</a>
  </div>
</div>`;

  // stats
  const eT=getAllDsaIds().filter(id=>getDiff(id)==="e").length;
  const mT=getAllDsaIds().filter(id=>getDiff(id)==="m").length;
  const hT=getAllDsaIds().filter(id=>getDiff(id)==="h").length;
  h+=`<div class="dsa-stats-row">
  <div class="dsa-stat-box">
    <div class="dsa-stat-lbl">Total Solved</div>
    <div class="dsa-stat-val" id="dsa_stat_total">${stats.done}/${stats.total}</div>
    <div class="dsa-stat-sub">problems</div>
  </div>
  <div class="dsa-stat-box">
    <div class="dsa-stat-lbl" style="color:var(--easy)">Easy</div>
    <div class="dsa-stat-val" id="dsa_stat_easy" style="color:var(--easy)">${stats.easy}/${eT}</div>
    <div class="dsa-stat-sub">solved</div>
  </div>
  <div class="dsa-stat-box">
    <div class="dsa-stat-lbl" style="color:var(--med)">Medium</div>
    <div class="dsa-stat-val" id="dsa_stat_med" style="color:var(--med)">${stats.med}/${mT}</div>
    <div class="dsa-stat-sub">solved</div>
  </div>
  <div class="dsa-stat-box">
    <div class="dsa-stat-lbl" style="color:var(--hard)">Hard</div>
    <div class="dsa-stat-val" id="dsa_stat_hard" style="color:var(--hard)">${stats.hard}/${hT}</div>
    <div class="dsa-stat-sub">solved</div>
  </div>
</div>`;

  // phases
  DSA_PHASES.forEach(ph=>{
    const{done,total,pct}=phaseProg(ph);
    h+=`<div class="dsa-phase-banner" id="dsa-ph-${ph.id}">
  <div class="dsa-phase-top">
    <div class="dsa-phase-left">
      <span class="dsa-phase-num">${ph.num}</span>
      <div>
        <div class="dsa-phase-title">${ph.title}</div>
        <div class="dsa-phase-goal">${ph.goal}</div>
      </div>
    </div>
    <div style="text-align:right;flex-shrink:0">
      <div style="font-family:'Geist Mono',monospace;font-size:13px;font-weight:500;color:var(--text)" id="dsa-ph-pct-${ph.id}">${pct}%</div>
      <div style="font-family:'Geist Mono',monospace;font-size:10px;color:var(--text3)">${ph.weeks}</div>
    </div>
  </div>
  <div class="dsa-phase-bar-wrap">
    <div class="dsa-phase-bar"><div class="dsa-phase-fill" id="dsa-ph-fill-${ph.id}" style="width:${pct}%"></div></div>
    <div class="dsa-phase-pct">${done}/${total}</div>
  </div>
</div>`;

    // groups in 2-col grid
    const pairs=[];
    for(let i=0;i<ph.groups.length;i+=2)pairs.push([ph.groups[i],ph.groups[i+1]]);
    pairs.forEach(pair=>{
      h+=`<div class="dsa-grid">`;
      pair.forEach(grp=>{
        if(!grp)return;
        const gD=grp.items.filter(i=>S[i.id]).length;
        h+=`<div class="dsa-card">
  <div class="dsa-card-header">
    <div class="dsa-card-title">${grp.title}</div>
    <div class="dsa-card-count" id="dc-${grp.id}">${gD}/${grp.items.length}</div>
  </div>
  <div class="dsa-items">
    ${grp.items.map(item=>{
      const done=!!S[item.id];
      return`<div class="dsa-pattern-row${done?" done":""}" onclick="toggleItem('${item.id}','c7')">
      <div class="dsa-prow-left">
        <div class="dsa-check">${done?CK13:""}</div>
        <div class="dsa-label">${item.label}</div>
      </div>
      <div style="display:flex;align-items:center;gap:6px;flex-shrink:0">
        <a class="lc-link" href="https://leetcode.com/problems/${lcSlug(item.label)}/" target="_blank" onclick="event.stopPropagation()">#${item.lc}</a>
        <div class="diff-dot diff-${item.diff}"></div>
      </div>
    </div>`;
    }).join("")}
  </div>
</div>`;
      });
      h+=`</div>`;
    });
  });

  return h;
}

function lcSlug(name){
  return name.toLowerCase()
    .replace(/[^a-z0-9 ]/g,"")
    .replace(/\s+/g,"-")
    .replace(/-+/g,"-")
    .replace(/^-|-$/g,"");
}

function renderChunks(){
  const root=document.getElementById("chunksRoot");
  root.innerHTML="";
  CHUNKS.forEach((chunk,ci)=>{
    const{pct}=chunkProg(chunk);
    const el=document.createElement("div");
    el.className="chunk";
    el.id=chunk.id;

    let h=`<div class="chunk-header">
  <div>
    <div class="chunk-eyebrow">Chunk ${chunk.index}</div>
    <div class="chunk-title">${chunk.title}</div>
    <div class="chunk-goal">${chunk.goal}</div>
    ${chunk.tags&&chunk.tags.length?`<div class="chunk-meta">${chunk.tags.map(t=>`<span class="chunk-tag">${t.url?`<a href="${t.url}" target="_blank" rel="noopener">${t.label}</a>`:t.label}</span>`).join("")}</div>`:""}
  </div>
  <div class="chunk-right">
    <div class="chunk-pct-num" id="pct-${chunk.id}">${pct}%</div>
    <div class="chunk-bar"><div class="chunk-fill" id="fill-${chunk.id}" style="width:${pct}%"></div></div>
  </div>
</div>`;

    if(chunk.type==="fcc"||chunk.type==="odin"){
      chunk.sections.forEach(sec=>{
        const isC=CS[sec.id]!==undefined?CS[sec.id]:sec.collapsed||false;
        const dSec=sec.items.filter(i=>S[i.id]).length;
        h+=`<div class="section-block" id="sec-${sec.id}">
  <div class="section-header" onclick="toggleSection('${sec.id}')">
    <div class="section-title-wrap">
      <span class="section-icon">${isC?"▶":"▼"}</span>
      <span class="section-title">${sec.title}</span>
      <span class="section-badge">${sec.badge}</span>
    </div>
    <span class="section-count" id="sc-${sec.id}">${dSec}/${sec.items.length}</span>
  </div>
  ${!isC?`<div class="section-items">${sec.items.map(item=>{
    const done=!!S[item.id];
    return`<div class="step-item${done?" done":""}" onclick="toggleItem('${item.id}','${chunk.id}','${sec.id}')">
      <div class="step-check">${done?CK11:""}</div>
      <div class="step-label">${item.label}</div>
    </div>`;
  }).join("")}</div>`:""}
</div>`;
      });
      if(chunk.capstones&&chunk.capstones.length){
        h+=`<div class="week-label">Capstone Projects</div>`;
        chunk.capstones.forEach(cap=>{h+=capstoneHTML(cap,chunk.id)});
      }
    } else if(chunk.type==="tasks"){
      (chunk.tasks||[]).forEach(task=>{
        const done=!!S[task.id];
        h+=`<div class="task-item${done?" done":""}" onclick="toggleItem('${task.id}','${chunk.id}')">
  <div class="task-check">${done?CK15:""}</div>
  <div class="task-body">
    <div class="task-main">${task.main}</div>
    ${task.sub?`<div class="task-sub">${task.sub}</div>`:""}
  </div>
  ${task.date?`<div class="task-date">${task.date}</div>`:""}
</div>`;
      });
      if(chunk.capstones&&chunk.capstones.length){
        h+=`<div class="week-label">Capstone Projects</div>`;
        chunk.capstones.forEach(cap=>{h+=capstoneHTML(cap,chunk.id)});
      }
    } else if(chunk.type==="dsa"){
      h+=renderDsaChunk();
    }

    if(ci<CHUNKS.length-1)h+=`<hr class="chunk-divider">`;
    el.innerHTML=h;
    root.appendChild(el);
  });
}

function renderSidebar(){
  const nav=document.getElementById("sbNav");
  nav.innerHTML="";
  CHUNKS.forEach(chunk=>{
    const{pct}=chunkProg(chunk);
    const a=document.createElement("a");
    a.className="nav-item";
    a.href=`#${chunk.id}`;
    a.innerHTML=`<span class="nav-num">${chunk.index}</span><span class="nav-label">${chunk.title}</span><span class="nav-pct">${pct}%</span>`;
    a.onclick=()=>{if(window.innerWidth<=700){document.querySelector(".sidebar").classList.remove("open");document.getElementById("sidebarOverlay").classList.remove("open")}};
    nav.appendChild(a);
  });
}

function renderOverall(){
  const{done,total,pct}=overallProg();
  document.getElementById("overallFill").style.width=pct+"%";
  document.getElementById("overallPct").textContent=pct+"%";
  document.getElementById("topCount").textContent=`${done} / ${total} done`;
}

function renderAll(){renderChunks();renderSidebar();renderOverall()}

function toggleItem(id,chunkId,secId){
  S[id]=!S[id];save();
  const isDone=S[id];

  // update all matching elements
  document.querySelectorAll(`[onclick*="'${id}'"]`).forEach(el=>{
    el.classList.toggle("done",isDone);
    const isStep=el.classList.contains("step-item");
    const isDsa=el.classList.contains("dsa-item")||el.classList.contains("dsa-pattern-row");
    const isCap=el.classList.contains("cap-tick");
    if(isCap){const sm=el.querySelector(".ck-sm");if(sm)sm.innerHTML=isDone?CK11:"";}
    else{
      const ck=el.querySelector(".step-check,.dsa-check,.task-check");
      if(!ck)return;
      ck.innerHTML=isDone?(isDsa?CK13:isStep?CK11:CK15):"";
    }
  });

  // section count
  if(secId){
    const scEl=document.getElementById(`sc-${secId}`);
    if(scEl){
      for(const chunk of CHUNKS){
        if(!chunk.sections)continue;
        const sec=chunk.sections.find(s=>s.id===secId);
        if(sec){scEl.textContent=`${sec.items.filter(i=>S[i.id]).length}/${sec.items.length}`;break}
      }
    }
  }

  // dsa group count
  for(const ph of DSA_PHASES){
    for(const grp of ph.groups){
      if(grp.items.some(i=>i.id===id)){
        const cel=document.getElementById(`dc-${grp.id}`);
        if(cel)cel.textContent=`${grp.items.filter(i=>S[i.id]).length}/${grp.items.length}`;
        // phase bar
        const{done,total,pct}=phaseProg(ph);
        const pf=document.getElementById(`dsa-ph-fill-${ph.id}`);
        const pp=document.getElementById(`dsa-ph-pct-${ph.id}`);
        const pb=document.getElementById(`dsa-ph-${ph.id}`);
        if(pf)pf.style.width=pct+"%";
        if(pp)pp.textContent=pct+"%";
        // update the done/total in bar-wrap
        if(pb){const pw=pb.querySelector(".dsa-phase-pct");if(pw)pw.textContent=`${done}/${total}`;}
        break;
      }
    }
  }

  // dsa stats
  const stats=dsaTotal();
  const allIds=getAllDsaIds();
  const eT=allIds.filter(id=>getDiff(id)==="e").length;
  const mT=allIds.filter(id=>getDiff(id)==="m").length;
  const hT=allIds.filter(id=>getDiff(id)==="h").length;
  const st=document.getElementById("dsa_stat_total");
  const se=document.getElementById("dsa_stat_easy");
  const sm=document.getElementById("dsa_stat_med");
  const sh=document.getElementById("dsa_stat_hard");
  if(st)st.textContent=`${stats.done}/${stats.total}`;
  if(se)se.textContent=`${stats.easy}/${eT}`;
  if(sm)sm.textContent=`${stats.med}/${mT}`;
  if(sh)sh.textContent=`${stats.hard}/${hT}`;

  // chunk bar
  const chunk=CHUNKS.find(c=>c.id===chunkId);
  if(chunk){
    const{pct}=chunkProg(chunk);
    const pe=document.getElementById(`pct-${chunkId}`);
    const fe=document.getElementById(`fill-${chunkId}`);
    if(pe)pe.textContent=pct+"%";
    if(fe)fe.style.width=pct+"%";
  }
  renderSidebar();
  renderOverall();
}

function toggleSidebar(){
  document.querySelector(".sidebar").classList.toggle("open");
  document.getElementById("sidebarOverlay").classList.toggle("open");
}

function toggleSection(secId){
  let defC=false;
  for(const chunk of CHUNKS){
    if(!chunk.sections)continue;
    const sec=chunk.sections.find(s=>s.id===secId);
    if(sec){defC=sec.collapsed||false;break}
  }
  const curr=CS[secId]!==undefined?CS[secId]:defC;
  CS[secId]=!curr;saveCS();
  const secEl=document.getElementById(`sec-${secId}`);
  if(!secEl)return;
  const icon=secEl.querySelector(".section-icon");
  const isNowC=CS[secId];
  if(icon)icon.textContent=isNowC?"▶":"▼";
  let items=secEl.querySelector(".section-items");
  if(isNowC&&items){items.remove();}
  if(!isNowC&&!items){
    for(const chunk of CHUNKS){
      if(!chunk.sections)continue;
      const sec=chunk.sections.find(s=>s.id===secId);
      if(sec){
        const div=document.createElement("div");
        div.className="section-items";
        div.innerHTML=sec.items.map(item=>{
          const done=!!S[item.id];
          return`<div class="step-item${done?" done":""}" onclick="toggleItem('${item.id}','${chunk.id}','${sec.id}')">
    <div class="step-check">${done?CK11:""}</div>
    <div class="step-label">${item.label}</div>
  </div>`;
        }).join("");
        secEl.appendChild(div);break;
      }
    }
  }
}

function confirmReset(){
  if(confirm("Reset all progress? This cannot be undone.")){S={};save();renderAll()}
}

const TK="lokesh_theme_v4";
function applyTheme(light){
  document.documentElement.classList.toggle("light",light);
  const btn=document.getElementById("themeBtn");
  if(btn)btn.textContent=light?"☽":"☀︎";
}
function toggleTheme(){
  const isL=document.documentElement.classList.contains("light");
  localStorage.setItem(TK,isL?"dark":"light");
  applyTheme(!isL);
}
applyTheme(localStorage.getItem(TK)==="light");

renderAll();
    </script>
  </body>
</html>
